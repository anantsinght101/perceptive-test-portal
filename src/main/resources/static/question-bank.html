<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perceptive AI | Question Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, rgba(30, 39, 46, 0.9) 0%, rgba(30, 39, 46, 0.9) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8f9fa;
            min-height: 100vh;
        }
        /* Sidebar Styles */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; top: 0; left: -260px;
            background: #1e272e; color: white; padding-top: 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }
        .sidebar a, .sidebar button {
            display: block; color: #d2dae2; text-decoration: none; padding: 15px 25px;
            font-size: 1rem; width: 100%; border: none; background: transparent; transition: 0.2s;
        }
        .sidebar a:hover, .sidebar button:hover { background: #485460; color: white; }
        .sidebar.open { left: 0; }
        
        /* Layout Components */
        .header { background: #050505; color: white; padding: 18px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 900; }
        .menu-btn { font-size: 1.4rem; color: white; background: transparent; border: none; cursor: pointer; position: absolute; left: 20px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 999; }
        .overlay.show { display: block; }
        
        /* Dashboard Cards */
        .box { 
            background: #ffffff; border-radius: 12px; padding: 30px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.3s ease;
            height: 100%; border: 1px solid rgba(255,255,255,0.1);
            color: #1e272e;
        }
        
        .question-card {
            background: #ffffff; border-radius: 12px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.3s ease;
            color: #2f3640; border-left: 5px solid #0097e6;
        }
        .question-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .badge-difficulty { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        .badge-easy { background: #4cd137; color: white; }
        .badge-medium { background: #fbc531; color: #2f3640; }
        .badge-hard { background: #e84118; color: white; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2 class="text-center mb-4">Perceptive AI</h2>
        <a href="teacher-dashboard.html"><i class="fas fa-chart-line me-2"></i> Dashboard</a> 
        <a href="manage-users.html"><i class="fas fa-users me-2"></i> Students</a> 
        <a href="settings.html"><i class="fas fa-cog me-2"></i> Settings</a> 
        <hr class="mx-3">
        <button onclick="handleLogout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
    </div>

    <header class="header">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1 class="h4 mb-0">Question Bank</h1>
    </header>

    <div class="content p-4">
        <div class="container mt-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-server me-2"></i> Global Question Pool</h2>
                <a href="generate-questions.html" class="btn btn-success"><i class="fas fa-plus"></i> Generate New</a>
            </div>

            <div id="loading" class="text-center">
                <div class="loader"></div>
                <p>Loading questions...</p>
            </div>

            <div id="error-message" class="alert alert-danger" style="display: none;"></div>

            <div class="row">
                <div class="col-12">
                    <div id="questions-container">
                        <!-- Questions will be injected here -->
                    </div>
                    
                    <div id="empty-state" class="text-center py-5" style="display: none; background: rgba(255,255,255,0.1); border-radius: 12px;">
                        <i class="fas fa-folder-open fa-4x mb-3 text-muted"></i>
                        <h4>No questions found</h4>
                        <p class="text-muted">Generate questions from PDF to populate the pool.</p>
                        <a href="generate-questions.html" class="btn btn-primary mt-2">Generate Now</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");
            sidebar.classList.toggle("open");
            overlay.classList.toggle("show");
        }

        function handleLogout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        async function fetchQuestions() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const loading = document.getElementById('loading');
            const questionsContainer = document.getElementById('questions-container');
            const errorMessage = document.getElementById('error-message');
            const emptyState = document.getElementById('empty-state');

            try {
                const response = await fetch('/api/questions/all', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const questions = await response.json();
                    loading.style.display = 'none';

                    if (questions.length === 0) {
                        emptyState.style.display = 'block';
                    } else {
                        renderQuestions(questions);
                    }
                } else {
                    throw new Error('Failed to load questions. Status: ' + response.status);
                }
            } catch (error) {
                loading.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = error.message;
            }
        }

        function getDifficultyClass(difficulty) {
            if (!difficulty) return 'badge-medium';
            const diff = difficulty.toLowerCase();
            if (diff === 'easy') return 'badge-easy';
            if (diff === 'hard') return 'badge-hard';
            return 'badge-medium';
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            // Sort by ID descending (newest first)
            questions.sort((a, b) => b.id - a.id);

            questions.forEach(q => {
                const badgeClass = getDifficultyClass(q.difficulty);
                const optionsHtml = q.options ? q.options.map((opt, i) => 
                    `<div class="mb-1"><small><b>${String.fromCharCode(65+i)}.</b> ${opt}</small></div>`
                ).join('') : '';

                const questionHtml = `
                    <div class="question-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="mb-0">#${q.id} ${q.content}</h5>
                            <span class="badge ${badgeClass} badge-difficulty">${q.difficulty || 'MEDIUM'}</span>
                        </div>
                        
                        <div class="mb-2 text-muted small">
                            <span><i class="fas fa-book"></i> Subject: <b>${q.subject || 'N/A'}</b></span>
                            <span class="ms-3"><i class="fas fa-list"></i> Type: <b>${q.type || 'MCQ'}</b></span>
                        </div>
                        
                        <div class="options-container mb-2 ps-3 border-start">
                            ${optionsHtml}
                        </div>
                        
                        <div class="mt-2 text-success">
                            <i class="fas fa-check-circle"></i> Correct Answer: <b>${q.correctAnswer || 'N/A'}</b>
                        </div>
                    </div>
                `;
                container.innerHTML += questionHtml;
            });
        }

        window.onload = fetchQuestions;
    </script>
</body>
</html>
