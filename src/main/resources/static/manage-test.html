<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perceptive AI | Manage Tests</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Linear gradient over a dark slate background */
            background: linear-gradient(to bottom, rgba(30, 39, 46, 0.9) 0%, rgba(30, 39, 46, 0.9) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8f9fa;
            min-height: 100vh;
        }
        /* Sidebar Styles */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; top: 0; left: -260px;
            background: #1e272e; color: white; padding-top: 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }
        .sidebar a, .sidebar button {
            display: block; color: #d2dae2; text-decoration: none; padding: 15px 25px;
            font-size: 1rem; width: 100%; border: none; background: transparent; transition: 0.2s;
            text-align: left;
        }
        .sidebar a:hover, .sidebar button:hover { background: #485460; color: white; }
        .sidebar.open { left: 0; }
        
        /* Layout Components */
        .header { background: #050505; color: white; padding: 18px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 900; }
        .menu-btn { font-size: 1.4rem; color: white; background: transparent; border: none; cursor: pointer; position: absolute; left: 20px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 999; }
        .overlay.show { display: block; }
        
        /* Table Styles */
        .card {
            background-color: #2f3640;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .table {
            color: #f5f6fa;
        }
        .table thead th {
            border-bottom: 2px solid #576574;
            color: #dcdde1;
        }
        .table tbody td {
            border-bottom: 1px solid #353b48;
            vertical-align: middle;
        }
        .badge-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        .status-DRAFT { background: #fbc531; color: #353b48; }
        .status-PUBLISHED { background: #4cd137; color: #fff; }
        .status-ARCHIVED { background: #7f8fa6; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2 class="text-center mb-4 text-white">Perceptive AI</h2>
        <a href="teacher-dashboard.html"><i class="fas fa-chart-line me-2"></i> Dashboard</a> 
        <a href="manage-users.html"><i class="fas fa-users me-2"></i> Students</a> 
        <a href="settings.html"><i class="fas fa-cog me-2"></i> Settings</a> 
        <hr class="mx-3 border-secondary">
        <button onclick="handleLogout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
    </div>

    <header class="header">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1 class="h4 mb-0">Manage Tests</h1>
    </header>

    <div class="content p-4">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">All Tests</h3>
                <a href="create-test.html" class="btn btn-primary"><i class="fas fa-plus me-2"></i> Create Test</a>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-borderless align-middle" id="testsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Duration</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Created On</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Tests will be populated here by JavaScript -->
                                <tr>
                                    <td colspan="6" class="text-center py-4 text-muted">Loading tests...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");
            sidebar.classList.toggle("open");
            overlay.classList.toggle("show");
        }

        function handleLogout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        async function fetchTests() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('/api/tests/my-tests', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const tests = await response.json();
                    populateTable(tests);
                } else if (response.status === 403) {
                    alert('Session expired or unauthorized.');
                    window.location.href = 'login.html';
                } else {
                    document.querySelector('#testsTable tbody').innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load tests.</td></tr>`;
                }
            } catch (error) {
                console.error("Error fetching tests:", error);
                document.querySelector('#testsTable tbody').innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Error connecting to server.</td></tr>`;
            }
        }

        function populateTable(tests) {
            const tbody = document.querySelector('#testsTable tbody');
            tbody.innerHTML = '';

            if (tests.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No tests found. Create one to get started.</td></tr>`;
                return;
            }

            // Sort tests by ID descending so newest is first
            tests.sort((a, b) => b.id - a.id);

            tests.forEach(test => {
                const createdDate = test.createdAt ? new Date(test.createdAt).toLocaleDateString() : 'N/A';
                const type = test.public ? 'Public' : 'Private';
                const typeBadge = test.public ? 'bg-info' : 'bg-secondary';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${test.id}</td>
                    <td class="fw-bold">${test.title}</td>
                    <td>${test.durationInMinutes} mins</td>
                    <td><span class="badge ${typeBadge}">${type}</span></td>
                    <td><span class="badge-status status-${test.status}">${test.status}</span></td>
                    <td>${createdDate}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchTests;
    </script>
</body>
</html>
