<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perceptive | Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(to bottom, rgba(92, 77, 66, 0.8) 0%, rgba(92, 77, 66, 0.8) 100%), 
                        url("assets/img/bg-masthead.jpg") no-repeat center center;    
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .header-bar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #5C4D42; padding: 10px 20px; color: white;
            width: 100%; position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .logo { height: 35px; width: 35px; margin-right: 10px; }
        .home-button {
            background-color: #DED7C7; color: black; padding: 6px 12px;
            border-radius: 4px; text-decoration: none; font-weight: bold;
        }
        .card { width: 100%; max-width: 500px; border: none; }
        .cardbody-color { background: #DED7C7; border-radius: 10px; }
        .btn-color { background-color: #0e1c36; color: #fff; width: 100%; }
        .footer {
            background-color: #5C4D42; color: white; width: 100%;
            text-align: center; padding: 10px 0; position: fixed; bottom: 0;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="d-flex align-items-center">
            <img src="assets/img/logo1.png" alt="Logo" class="logo">
            <span>Perceptive AI</span>
        </div>
        <a href="index.html" class="home-button">Home</a>
    </div>

    <div class="container d-flex justify-content-center">
        <div class="card shadow-lg">
            <form id="signupForm" class="card-body cardbody-color p-4 text-center">
                <h2 class="mb-3" style="color: #5C4D42; font-weight: bold;">Create Account</h2>
                <hr>
                
                <div class="mb-3">
                    <input type="text" class="form-control" name="name" placeholder="Full Name" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" name="email" placeholder="Email Address" required>
                </div>
                <div class="mb-3">
                    <input type="tel" class="form-control" name="phone" placeholder="Phone Number" required>
                </div>
                <div class="mb-3">
                    <select class="form-select" name="role" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher (Admin)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-color py-2">Sign Up</button>
                
                <div class="mt-3">
                    <span class="text-dark">Already have an account? </span>
                    <a href="login.html" class="text-dark fw-bold">Login</a>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="social-icons">
            <a href="#" class="mx-2 text-white"><i class="bi bi-github"></i></a>
            <a href="#" class="mx-2 text-white"><i class="bi bi-linkedin"></i></a>
        </div>
    </footer>

<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Registration Successful! Please login.");
                window.location.href = "login.html";
            } else {
                const errorData = await response.json();
                alert("Registration Failed: " + (errorData.message || "Unknown error"));
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>

</body>
</html>
