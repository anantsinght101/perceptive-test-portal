<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perceptive AI | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Linear gradient over a dark slate background */
            background: linear-gradient(to bottom, rgba(30, 39, 46, 0.9) 0%, rgba(30, 39, 46, 0.9) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8f9fa;
            min-height: 100vh;
        }
        /* Sidebar Styles */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; top: 0; left: -260px;
            background: #1e272e; color: white; padding-top: 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }
        .sidebar a, .sidebar button {
            display: block; color: #d2dae2; text-decoration: none; padding: 15px 25px;
            font-size: 1rem; width: 100%; border: none; background: transparent; transition: 0.2s;
        }
        .sidebar a:hover, .sidebar button:hover { background: #485460; color: white; }
        .sidebar.open { left: 0; }
        
        /* Layout Components */
        .header { background: #050505; color: white; padding: 18px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 900; }
        .menu-btn { font-size: 1.4rem; color: white; background: transparent; border: none; cursor: pointer; position: absolute; left: 20px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 999; }
        .overlay.show { display: block; }
        
        /* Dashboard Cards */
        .box { 
            background: #ffffff; border-radius: 12px; padding: 30px; text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.3s ease;
            height: 100%; border: 1px solid rgba(255,255,255,0.1);
        }
        .box:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .box h4 { color: #1e272e; font-weight: 700; margin-top: 15px; }
        .box p { color: #808e9b; margin-bottom: 0; }
        .disabled-box { opacity: 0.6; cursor: not-allowed !important; background: #d2dae2; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2 class="text-center mb-4">Perceptive AI</h2>
        <a href="#"><i class="fas fa-chart-line me-2"></i> Dashboard</a> 
        <a href="manage-users.html"><i class="fas fa-users me-2"></i> Students</a> 
        <a href="settings.html"><i class="fas fa-cog me-2"></i> Settings</a> 
        <hr class="mx-3">
        <button onclick="handleLogout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
    </div>

    <header class="header">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    </header>

    <div class="content p-4">
        <div class="container mt-4">
            <div class="row g-4">
                
                <div class="col-md-4">
                    <a href="create-test.html" class="text-decoration-none">

                    </a>
                </div>

                <div class="col-md-4">

                            <h4>Smart MCQ Generator</h4>
                            <p>Extract questions via AI PDF Pipeline</p>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="manage-test.html" class="text-decoration-none">

                    </a>
                </div>

                <div class="col-md-4">
                    <a href="question-bank.html" class="text-decoration-none">

                            <i class="fas fa-server fa-3x text-info"></i>
                            <h4>Question Bank</h4>
                            <p>5000+ items in pool</p>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="analysis.html" class="text-decoration-none">

                            <h4>Test Analysis</h4>
                            <p>View proctoring flags</p>
                        </div>
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");
            sidebar.classList.toggle("open");
            overlay.classList.toggle("show");
        }

        function handleLogout() {
            // Placeholder for JWT removal logic
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
